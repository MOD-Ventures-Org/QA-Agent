name: ARIA QA Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  aria-qa:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run ARIA unit tests + any generated tests
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: aria
          BASE_URL_FRONTEND: ${{ secrets.BASE_URL_FRONTEND }}
          BASE_URL_API: ${{ secrets.BASE_URL_API }}
          PLAYWRIGHT_HEADLESS: "True"
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          python -m pytest tests/ testing/suites/generated/ \
            --json-report \
            --json-report-file=report.json \
            -v \
            --timeout=300 \
            || true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aria-report
          path: report.json

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aria-screenshots
          path: /tmp/aria_screenshots/
          if-no-files-found: ignore

      # Discord reporting is handled by the ARIA agent (webhook pipeline), which
      # posts the full "ARIA Report". The CI workflow no longer posts a separate
      # "ARIA CI Report" to avoid duplicate messages.
