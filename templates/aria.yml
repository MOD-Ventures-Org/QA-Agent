# TEMPLATE — do NOT place this in ARIA's own .github/workflows/.
# Copy it into a TARGET repo (the app under test) as
# .github/workflows/aria.yml. GitHub runs a workflow against whatever repo it
# lives in, so keeping it here made ARIA test itself. In a target repo, the
# "Checkout target repo" step below checks out that app, and ARIA runs against it.
name: ARIA QA Pipeline

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

jobs:
  aria-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo (app under test)
        uses: actions/checkout@v4
        # GITHUB_WORKSPACE now points to your app — ARIA skips clone automatically

      - name: Checkout ARIA agent
        uses: actions/checkout@v4
        with:
          repository: RamaishaRehman/QA-Agent
          path: aria-agent
          token: ${{ secrets.ARIA_GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ARIA dependencies
        run: pip install -r aria-agent/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run ARIA pipeline
        run: python aria-agent/scripts/run_ci_pipeline.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ENABLED: "True"
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID || '' }}
          CLICKUP_ENABLED: ${{ secrets.CLICKUP_ENABLED || 'False' }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: aria
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_URL_FRONTEND: ${{ secrets.BASE_URL_FRONTEND }}
          BASE_URL_API: ${{ secrets.BASE_URL_API }}
          PLAYWRIGHT_HEADLESS: "True"

      - name: Upload generated tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-tests
          path: aria-agent/testing/suites/generated/
          if-no-files-found: ignore
